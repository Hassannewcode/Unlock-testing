<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Web Page Element Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="personas.js"></script> <!-- Include the personas script -->
    <style>
        body {
            font-family: 'Roboto', 'Arial', sans-serif;
            display: flex;
            flex-direction: row;
            min-height: 100vh;
            background-color: #121212; /* Dark mode background */
            color: #e0e0e0; /* Dark mode text */
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .main-content-area {
            display: flex;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .left-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
            background-color: #1e1e1e;
            border-right: 1px solid #333;
            height: 100%;
            overflow: hidden;
        }

        .right-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
            background-color: #242424;
            height: 100%;
            overflow: hidden;
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #333;
            background-color: #1e1e1e;
        }

        .app-header h1 {
            color: #bb86fc;
            margin: 0;
            font-family: 'Google Sans', 'Roboto', sans-serif;
            font-weight: 500;
            font-size: 1.25rem;
        }

        .persona-selector-container select {
            background-color: #2c2c2c;
            color: #e0e0e0;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #444;
            font-size: 0.875rem;
            cursor: pointer;
        }
        .persona-selector-container select:focus {
            outline: none;
            border-color: #bb86fc;
            box-shadow: 0 0 0 2px rgba(187, 134, 252, 0.3);
        }

        #chatAndCodeContainer {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow: hidden;
            padding: 16px;
        }

        #chatInterface {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            height: 60%; /* Proportion of left panel */
        }

        #chatMessages {
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 16px;
            margin-bottom: 16px;
            background-color: #2c2c2c;
            border-radius: 4px;
            color: #e0e0e0;
        }

        .message {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 20px;
            line-height: 1.5;
            max-width: 90%; /* Slightly wider for AI messages */
            word-wrap: break-word;
            font-size: 0.9rem;
        }
        .user-message {
            background-color: #0360df;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 6px;
        }
        .ai-message {
            background-color: #373737;
            color: #e0e0e0;
            margin-right: auto;
            border-bottom-left-radius: 6px;
        }
        .system-message {
            font-size: 0.8rem;
            font-style: italic;
            color: #9e9e9e;
            text-align: center;
            margin: 8px 0;
            padding: 4px;
            background-color: transparent;
            max-width: 100%;
        }

        .ai-message pre, .code-block-wrapper pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            background-color: #1a1a1a;
            color: #d4d4d4;
            padding: 12px;
            border-radius: 4px;
            margin-top: 8px;
            font-family: 'Roboto Mono', 'Courier New', monospace;
            font-size: 0.875em;
            border: 1px solid #444;
            overflow-x: auto;
        }
        .thinking-block {
            padding: 8px 12px;
            background-color: rgba(187, 134, 252, 0.1);
            border-left: 3px solid #bb86fc;
            border-radius: 4px;
            margin: 8px 0;
            font-style: italic;
            color: #bdbdbd;
            font-size: 0.85rem;
        }
        .quick-edit-block {
            margin: 8px 0;
            padding: 8px 12px;
            border: 1px solid #f59e0b;
            border-left-width: 3px;
            background-color: rgba(245, 158, 11, 0.1);
            border-radius: 4px;
            font-size: 0.85rem;
        }
        .quick-edit-block .font-semibold { color: #fcd34d; }

        .delete-file-block {
            margin: 8px 0;
            padding: 8px 12px;
            border: 1px solid #ef4444;
            border-left-width: 3px;
            background-color: rgba(239, 68, 68, 0.1);
            border-radius: 4px;
            font-size: 0.85rem;
        }
        .delete-file-block .font-semibold { color: #fca5a5; }


        .thinking-message {
             font-style: italic;
             color: #aaa;
             font-size: 0.85rem;
        }
        .code-block-wrapper {
            margin: 8px 0;
        }
        .code-block-header {
            background-color: #424242;
            color: #e0e0e0;
            padding: 6px 10px;
            font-size: 0.8rem;
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
            font-family: 'Roboto Mono', monospace;
        }

        #userInputArea {
            display: flex;
            padding: 10px 0;
        }
        #userInput {
            flex-grow: 1;
            padding: 12px 18px;
            border: 1px solid #444;
            border-radius: 25px;
            font-size: 0.95rem;
            line-height: 1.5;
            background-color: #2c2c2c;
            color: #e0e0e0;
        }
        #userInput:focus {
            outline: none;
            border-color: #bb86fc;
            box-shadow: 0 0 0 2px rgba(187, 134, 252, 0.3);
        }
        #sendButton {
            padding: 12px 24px;
            margin-left: 10px;
            border: none;
            background-color: #03dac6;
            color: #121212;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background-color 0.2s ease;
        }
        #sendButton:hover {
            background-color: #01bea5;
        }

        #codePreviewContainer {
            background-color: #1e1e1e;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 40%;
            margin-top: 16px;
            border-radius: 4px;
            border: 1px solid #333;
        }
        #codePreviewContainer h2 {
            margin: 0;
            padding: 10px 16px;
            color: #bb86fc;
            font-size: 1.1rem;
            font-weight: 500;
            background-color: #2c2c2c;
            border-bottom: 1px solid #333;
        }
        #htmlCodeOutput {
            width: 100%;
            flex-grow: 1;
            box-sizing: border-box;
            font-family: 'Roboto Mono', 'Courier New', monospace;
            border: none;
            padding: 16px;
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-size: 0.9em;
            line-height: 1.6;
            resize: none;
            overflow-y: auto;
            border-bottom-left-radius: 4px;
            border-bottom-right-radius: 4px;
        }
        #htmlCodeOutput:focus { outline: none; }

        #fileTabsContainer {
            display: flex;
            flex-wrap: wrap;
            background-color: #2c2c2c;
            padding: 4px 4px 0 4px;
            border-bottom: 1px solid #333;
        }
        .file-tab {
            background-color: #424242;
            color: #bdbdbd;
            padding: 8px 12px;
            margin-right: 4px;
            margin-bottom: -1px;
            border: 1px solid #333;
            border-bottom: none;
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        .file-tab:hover {
            background-color: #555;
            color: #fff;
        }
        .file-tab.active {
            background-color: #1e1e1e;
            color: #bb86fc;
            border-bottom: 1px solid #1e1e1e;
            font-weight: 500;
        }

        #webPreviewContainer {
            padding: 16px;
            background-color: #242424;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #webPreviewContainer h2 {
            margin-top: 0;
            margin-bottom: 12px;
            padding: 10px 16px;
            color: #bb86fc;
            font-size: 1.1rem;
            font-weight: 500;
            background-color: #2c2c2c;
            border-bottom: 1px solid #333;
            border-radius: 4px;
        }
        #htmlOutput {
            border: 1px solid #333;
            padding: 16px;
            flex-grow: 1;
            background-color: #ffffff;
            color: #202124;
            border-radius: 4px;
            overflow-y: auto;
        }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #2c2c2c; border-radius: 5px; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #777; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100">
    <div class="main-content-area flex w-full h-screen overflow-hidden">
        <div class="left-panel w-1/2 flex flex-col border-r border-gray-700 bg-gray-850">
            <div class="app-header">
                <h1>AI Web Page Element Generator</h1>
                <div class="persona-selector-container">
                    <select id="personaSelector">
                        <!-- Options will be populated by JavaScript -->
                    </select>
                </div>
            </div>

            <div id="chatAndCodeContainer" class="flex flex-col flex-grow overflow-hidden p-4">
                <div id="chatInterface" class="flex flex-col flex-grow min-h-0 h-3/5">
                    <div id="chatMessages" class="flex-grow overflow-y-auto border border-gray-700 p-4 mb-4 bg-gray-750 rounded-md text-gray-200">
                        <!-- Messages will be appended here -->
                    </div>
                    <div id="userInputArea" class="flex py-2">
                        <input type="text" id="userInput" class="flex-grow p-3 border border-gray-600 rounded-full text-base bg-gray-700 text-gray-200 focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-600" placeholder="Loading...">
                        <button id="sendButton" class="p-3 px-6 ml-2.5 border-none bg-teal-400 text-gray-900 rounded-full cursor-pointer text-base font-medium transition-colors hover:bg-teal-300">Send</button>
                    </div>
                </div>

                <div id="codePreviewContainer">
                    <h2>Generated Code:</h2>
                    <div id="fileTabsContainer" class="flex flex-wrap border-b border-gray-700 bg-gray-750">
                        <!-- File tabs will be dynamically added here -->
                    </div>
                    <textarea id="htmlCodeOutput" readonly placeholder="// Code generated by AI will appear here..."></textarea>
                </div>
            </div>
        </div>

        <div class="right-panel w-1/2 flex flex-col">
            <div id="webPreviewContainer" class="p-4 bg-gray-850 flex-grow flex flex-col overflow-hidden">
                <h2>Rendered Output:</h2>
                <div id="htmlOutput" class="border border-gray-700 p-4 flex-grow bg-white text-gray-900 rounded-md overflow-y-auto">
                    <p class="italic">No content generated yet.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * AI Web Page Element Generator Script
         * Handles UI interactions, persona management, AI response simulation,
         * virtual file system, and rendering previews.
         */
        document.addEventListener('DOMContentLoaded', () => {
            // --- DOM Element References ---
            const userInputEl = document.getElementById('userInput');
            const sendButton = document.getElementById('sendButton');
            const chatMessagesEl = document.getElementById('chatMessages');
            const htmlOutputEl = document.getElementById('htmlOutput');
            const htmlCodeOutputEl = document.getElementById('htmlCodeOutput');
            const personaSelectorEl = document.getElementById('personaSelector');
            const fileTabsContainerEl = document.getElementById('fileTabsContainer');

            // --- Application State ---
            let virtualFileSystem = {};
            let currentOpenFile = "app/page.tsx";
            let currentPersonaId = "v0";
            let currentV0ProjectId = `v0project-${Date.now()}`;
            let currentProjectFiles = [];

            // --- Persona Management & Initialization ---
            /** Populates the persona selector dropdown and sets up event listeners. */
            function initializePersonaSystem() {
                if (typeof getAllPersonasForSelect === 'function') {
                    const personasForSelect = getAllPersonasForSelect();
                    personasForSelect.forEach(persona => {
                        const option = document.createElement('option');
                        option.value = persona.id;
                        option.textContent = persona.displayName;
                        personaSelectorEl.appendChild(option);
                    });
                    personaSelectorEl.value = currentPersonaId;
                } else {
                    console.error("Personas could not be loaded. Ensure personas.js is included and correct.");
                    addMessageToChat("Error: AI Personas could not be loaded.", 'system');
                }

                personaSelectorEl.addEventListener('change', (event) => {
                    currentPersonaId = event.target.value;
                    const selectedPersona = getPersonaById(currentPersonaId);
                    addMessageToChat(`Switched to ${selectedPersona ? selectedPersona.displayName : 'Unknown'} persona.`, 'system');
                    updateUserInputPlaceholder();
                    displayInitialWelcomeMessage();
                    if (currentPersonaId !== 'v0') {
                        currentV0ProjectId = null;
                        updateFileTabs([]);
                    } else if (!currentV0ProjectId) {
                        currentV0ProjectId = `v0project-${Date.now()}`;
                    }
                });
            }

            /** Updates the input field's placeholder text based on the current AI persona. */
            function updateUserInputPlaceholder() {
                const persona = getPersonaById(currentPersonaId);
                if (persona) {
                    switch(persona.id) {
                        case 'v0':
                            userInputEl.placeholder = "v0: Try 'create a Next.js component MyButton with a primary variant' or 'add a heading to app/page.tsx'";
                            break;
                        case 'julesAI':
                            userInputEl.placeholder = "Jules: e.g., 'plan feature for user authentication' or 'create script.js with a debounce function'";
                            break;
                        case 'claudeSonnet':
                            userInputEl.placeholder = "Claude: e.g., 'summarize this article...' or 'explain quantum computing simply'";
                            break;
                        case 'chatGPT4':
                            userInputEl.placeholder = "ChatGPT4: e.g., 'write a python script to parse csv' or 'draft an email to a client'";
                            break;
                        case 'geminiPro':
                            userInputEl.placeholder = "Gemini: e.g., 'help me brainstorm ideas for a new app' or 'what are the pros and cons of X?'";
                            break;
                        default:
                            userInputEl.placeholder = `Ask ${persona.displayName}...`;
                    }
                } else {
                    userInputEl.placeholder = "Enter your request...";
                }
            }

            /** Clears chat and displays a persona-specific welcome message. */
            function displayInitialWelcomeMessage() {
                chatMessagesEl.innerHTML = '';
                const persona = getPersonaById(currentPersonaId);
                let welcome = `Hello! I'm ${persona ? persona.displayName : 'your AI Assistant'}. How can I help?`;
                if (persona) {
                    if (persona.id === 'v0') welcome = "v0 ready. Describe the UI you want to build using Next.js, Tailwind, and shadcn/ui.";
                    else if (persona.id === 'julesAI') welcome = "Jules here. Task received. Analyzing requirements...";
                }
                addMessageToChat(welcome, "ai");
            }

            initializePersonaSystem();
            ensureFileExists(currentOpenFile);
            updateUserInputPlaceholder();
            displayInitialWelcomeMessage();

            // --- File Tab Management for v0 CodeProjects ---
            /**
             * Dynamically creates and manages file tabs for v0's CodeProject outputs.
             * @param {Array<{path: string, content: string}>} projectFiles - Array of file objects.
             */
            function updateFileTabs(projectFiles) {
                fileTabsContainerEl.innerHTML = '';
                currentProjectFiles = projectFiles || [];

                if (currentProjectFiles.length > 0) {
                    fileTabsContainerEl.style.display = 'flex';
                    currentProjectFiles.forEach((file) => {
                        const tabEl = document.createElement('div');
                        tabEl.classList.add('file-tab');
                        tabEl.textContent = file.path.split('/').pop();
                        tabEl.dataset.filePath = file.path;

                        if (file.path === currentOpenFile) {
                            tabEl.classList.add('active');
                        }

                        tabEl.addEventListener('click', () => {
                            currentOpenFile = file.path;
                            renderPagePreview();
                            document.querySelectorAll('#fileTabsContainer .file-tab').forEach(t => t.classList.remove('active'));
                            tabEl.classList.add('active');
                        });
                        fileTabsContainerEl.appendChild(tabEl);
                    });
                } else {
                    fileTabsContainerEl.style.display = 'none';
                }
            }

            // --- Utility Functions ---
            /**
             * Escapes HTML special characters in a string to prevent XSS vulnerabilities.
             * @param {string} unsafe - The string to escape.
             * @returns {string} The escaped string.
             */
            function escapeHtml(unsafe) {
                if (typeof unsafe !== 'string') return '';
                return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
            }
             /**
             * Escapes special characters in a string for use in a regular expression.
             * @param {string} string - The string to escape.
             * @returns {string} The escaped string.
             */
            function escapeRegExp(string) {
              return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

            /**
             * Formats the AI's response message for display in the chat.
             * Handles MDX for v0 (simulated) and basic Markdown for other personas.
             * @param {string} message - The raw message content from the AI.
             * @param {string} personaId - The ID of the current AI persona.
             * @returns {string} HTML formatted string for the chat message.
             */
            function formatAiResponse(message, personaId) {
                let formattedText = message;
                const persona = getPersonaById(personaId);

                if (persona && persona.responseFormat === 'mdx') {
                    formattedText = escapeHtml(message);

                    formattedText = formattedText.replace(/&lt;Thinking&gt;([\s\S]*?)&lt;\/Thinking&gt;/gi,
                        (match, thinkingContent) => `<div class="thinking-block">${thinkingContent}</div>`);

                    formattedText = formattedText.replace(/&lt;CodeProject id="([^"]+)"&gt;([\s\S]*?)&lt;\/CodeProject&gt;/gi,
                        (match, projectId, projectContent) => {
                            let processedProjectContent = projectContent.replace(/```(\w*)\s*file="([^"]+)"\n([\s\S]*?)\n```/g,
                                (fileMatch, lang, filePath, code) =>
                                `<div class="code-block-wrapper my-2"><div class="code-block-header">${escapeHtml(filePath)}${lang ? ` (${escapeHtml(lang)})` : ''}</div><pre>${escapeHtml(code)}</pre></div>`
                            );
                            return `<div class="code-project p-2 border border-gray-600 rounded my-2"><em class="text-sm text-gray-400 block mb-1">CodeProject ID: ${escapeHtml(projectId)}</em>${processedProjectContent}</div>`;
                        });

                    formattedText = formattedText.replace(/&lt;QuickEdit file="([^"]+)"&gt;([\s\S]*?)&lt;\/QuickEdit&gt;/gi,
                        (match, filePath, instruction) =>
                        `<div class="quick-edit-block"><div class="font-semibold text-yellow-300">Quick Edit: ${escapeHtml(filePath)}</div><div>${instruction}</div></div>`);

                    formattedText = formattedText.replace(/&lt;DeleteFile file="([^"]+)"\s*\/?&gt;/gi,
                        (match, filePath) =>
                        `<div class="delete-file-block"><div class="font-semibold text-red-300">File Deletion: ${escapeHtml(filePath)}</div><div>Instruction to delete this file was processed.</div></div>`);

                    formattedText = formattedText.replace(/(?<!file="[^"]+")```(\w*)\n([\s\S]*?)\n```/g,
                        (match, lang, codeContent) => {
                             const langDisplay = lang ? ` (${escapeHtml(lang)})` : '';
                            return `<pre class="bg-gray-900 p-2 my-2 rounded-md text-sm">${escapeHtml(codeContent)}${langDisplay}</pre>`;
                        });
                } else {
                    formattedText = escapeHtml(message);
                    formattedText = formattedText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    formattedText = formattedText.replace(/\*(.*?)\*/g, '<em>$1</em>');
                    formattedText = formattedText.replace(/`([^`]+)`/g, '<code class="inline-code bg-gray-700 px-1 rounded">$1</code>');
                    formattedText = formattedText.replace(/^(#{1,3}) (.*?)$/gm, (match, hashes, headingText) => {
                        const level = hashes.length;
                        return `<h${level} class="text-lg my-1 font-semibold">${headingText}</h${level}>`;
                    });
                    formattedText = formattedText.replace(/^\* (.*?)$/gm, '<li>$1</li>');
                    if (formattedText.includes('<li>')) {
                        formattedText = formattedText.replace(/(<li>.*?<\/li>)/gs, '<ul>$1</ul>').replace(/<\/ul>\s*<ul>/gs, '');
                    }
                    formattedText = formattedText.replace(/```(python|javascript|js|html|css)\n([\s\S]*?)\n```/gi,
                        (match, lang, codeContent) =>
                        `<pre class="bg-gray-900 p-2 my-2 rounded-md text-sm">(${escapeHtml(lang)})<br>${escapeHtml(codeContent)}</pre>`);

                    formattedText = formattedText.replace(/\n/g, '<br>');
                }
                return formattedText;
            }

            /**
             * Adds a message to the chat interface.
             * @param {string} message - The message content.
             * @param {string} sender - 'user', 'ai', or 'system'.
             * @param {boolean} [isCodeBlock=false] - True if the AI message is a distinct raw code block.
             * @param {boolean} [isThinkingFlag=false] - True if the AI message is a generic "thinking..." update.
             */
            function addMessageToChat(message, sender, isCodeBlock = false, isThinkingFlag = false) {
                const messageEl = document.createElement('div');
                messageEl.classList.add('message', sender + '-message');

                if (sender === 'system') {
                    messageEl.classList.add('system-message');
                    messageEl.textContent = message;
                } else if (sender === 'ai') {
                    const persona = getPersonaById(currentPersonaId);
                    if (isThinkingFlag && !(persona && persona.thinkingStyle === 'v0_thinking_block')) {
                        messageEl.innerHTML = `<em class="thinking-message">${escapeHtml(message)}</em>`;
                    } else if (isCodeBlock) {
                        const pre = document.createElement('pre');
                        pre.textContent = message;
                        messageEl.appendChild(pre);
                    } else {
                        let finalMessageContent = message;
                        if (persona && !message.trim().startsWith('<Thinking>') && !message.trim().startsWith('<CodeProject') && !message.trim().startsWith('<QuickEdit') && !message.trim().startsWith('<DeleteFile')) {
                           const personaPrefixPattern = new RegExp(`^(<strong>${escapeHtml(persona.displayName)}:</strong><br>|As ${escapeHtml(persona.displayName)}:|${escapeHtml(persona.displayName)}:)`, "i");
                           if (!personaPrefixPattern.test(message.trim())) {
                                finalMessageContent = `<strong>${escapeHtml(persona.displayName)}:</strong><br>` + message;
                           }
                        }
                        messageEl.innerHTML = formatAiResponse(finalMessageContent, currentPersonaId);
                    }
                } else { // User message
                    messageEl.textContent = escapeHtml(message);
                }
                chatMessagesEl.appendChild(messageEl);
                chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
            }

            /** Updates the rendered HTML preview and the code display area. */
            function renderPagePreview() {
                const path = currentOpenFile;
                const content = virtualFileSystem[path] || `// No content for ${path}, or file not found.`;

                if (path && (path.endsWith('.html') || path.endsWith('.htm'))) {
                    htmlOutputEl.innerHTML = content;
                } else {
                    htmlOutputEl.innerHTML = `<div class="p-4 text-gray-500 text-sm"><em>Live preview is primarily for HTML files. Currently viewing: '${escapeHtml(path)}'. Check 'Generated Code' for its content.</em></div>`;
                }
                htmlCodeOutputEl.value = `// --- File: ${escapeHtml(path)} ---\n\n${content}`;
            }

            /** Ensures a file path exists in the virtual file system. */
            function ensureFileExists(filePath) {
                if (filePath && !virtualFileSystem.hasOwnProperty(filePath)) {
                    virtualFileSystem[filePath] = "";
                }
            }

            /** Handles user input submission from the chat. */
            function handleUserInput() {
                const messageText = userInputEl.value.trim();
                if (messageText === '') return;
                addMessageToChat(messageText, 'user');
                userInputEl.value = '';
                processUserRequest(messageText);
            }

            // --- Core AI Simulation Logic ---
            /**
             * Simulates AI response based on user message and current persona.
             * @param {string} userMessage - User's input.

                    const quickEditMatch = lowerMessage.match(/(?:edit|modify|update|change) file [`']?([\w\/\.-]+)[`']?(?: to| and)? change (?:['"]([^'"]+)['"] to ['"]([^'"]+)['"]|(.*))/i);
                    const deleteFileMatch = lowerMessage.match(/(?:delete|remove) file [`']?([\w\/\.-]+)[`']?/i);


                    if (createFileMatch) {

                                    const iconNameRaw = contentDescription.match(/icon named ['"]([^'"]+)['"]/i)[1];
                                    const iconNamePascal = iconNameRaw.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('');

                                    importStatements.add(`import { Button } from '@/components/ui/button';`);

                                    break;

                                    newElementCode = `<Select>\n  <SelectTrigger className={"w-[180px] " + userClasses}>\n    <SelectValue placeholder="${escapeHtml(textOrSrc || 'Theme')}" />\n  </SelectTrigger>\n  <SelectContent>\n    <SelectItem value="light">Light</SelectItem>\n    <SelectItem value="dark">Dark</SelectItem>\n    <SelectItem value="system">System</SelectItem>\n  </SelectContent>\n</Select>`;

                                    newElementCode = `<img src="${imgSrc}" alt="${escapeHtml(textOrSrc)}" className={"rounded-md shadow-lg " + userClasses} />`; break;

                                     const iconNamePascal = textOrSrc.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('');

                                default: newElementCode = `<div className="${userClasses}">${escapeHtml(textOrSrc)} {/* Unknown element type: ${elementType} */ }</div>`;

                        }

                        let existingContent = virtualFileSystem[targetFile] || "";
                        let combinedImports = "";
                        importStatements.forEach(imp => {

                                     virtualFileSystem[targetFile] = combinedImports + beforeReturnEnd.substring(0, lastTagClose + 1) + `\n      ${newElementCode}\n    ` + beforeReturnEnd.substring(lastTagClose + 1) + afterReturnEnd;

                                     virtualFileSystem[targetFile] = combinedImports + beforeReturnEnd + `      ${newElementCode}\n    ` + afterReturnEnd;

                            virtualFileSystem[targetFile] = combinedImports + existingContent + `\n${newElementCode}\n`;

                        currentOpenFile = targetFile;
                        projectFilesOutput.push({ path: targetFile, content: virtualFileSystem[targetFile] });
                        response += `Added a ${elementType} to \`${targetFile}\`. Imports (if any) were added/checked. Preview updated.\n\`\`\`${isTsxTarget ? 'tsx' : 'html'} \n${newElementCode}\n\`\`\``;

                    } else if (styleRequestMatch) {

                            } else {
                                const insertPos = newTag.lastIndexOf('>') !== -1 ? newTag.lastIndexOf('>') : newTag.length;
                                newTag = newTag.substring(0, insertPos) + ` className="${tailwindClasses}"` + newTag.substring(insertPos);

                            virtualFileSystem[currentOpenFile] = currentFileContent.substring(0, lastMatchIndex) + newTag + currentFileContent.substring(lastMatchIndex + lastMatchTag.length);
                            response += `Attempted to apply style '${tailwindClasses}' to the last ${styleTargetType} in \`${currentOpenFile}\`. Please verify the result.`;

                            response += `Couldn't find a '${styleTargetType}' to style in \`${currentOpenFile}\`.`;

                    } else if (lowerMessage.startsWith("what is your name") || lowerMessage.startsWith("who are you")) {

                       response += "v0: I can help with Next.js, React, Tailwind. Try 'create file app/about/page.tsx with a heading About Us'.";

                // --- Generic LLM Personas Logic ---
                } else {

                    }
                }

                return { thinking: (persona.thinkingStyle === 'generic_thinking_message' ? thinking : ""), response, code, projectFiles: projectFilesOutput };
            }

            /**
             * Main function to process user input, trigger AI simulation, and update UI.
             * @param {string} userMessage - The user's chat message.
             */
            function processUserRequest(userMessage) {
                const currentPersona = getPersonaById(currentPersonaId);
                const lowerUserMessage = userMessage.toLowerCase();

                if (currentPersona && currentPersona.thinkingStyle === 'generic_thinking_message') {
                    addMessageToChat(`[${currentPersona.displayName} is processing: "${userMessage.substring(0,30)}..."]`, "ai", false, true);
                }

                setTimeout(() => {
                    const {
                        thinking: simulatedThinkingText,
                        response: aiResponseMessage,
                        code: distinctCodeOutput,
                        projectFiles: v0ProjectFiles
                    } = getSimulatedAiResponse(userMessage, currentPersonaId);

                    addMessageToChat(aiResponseMessage, 'ai');

                    if (distinctCodeOutput) {
                        addMessageToChat(distinctCodeOutput, 'ai', true);
                    }

                    if (currentPersona && currentPersona.id === 'v0') {
                        if (v0ProjectFiles && v0ProjectFiles.length > 0) {
                            updateFileTabs(v0ProjectFiles);
                            let foundOpenFile = v0ProjectFiles.find(f => f.path === currentOpenFile);
                            if (!foundOpenFile && v0ProjectFiles.length > 0) {
                                currentOpenFile = v0ProjectFiles.find(f => f.path.includes("page.tsx"))?.path || v0ProjectFiles[0].path;
                            }
                            document.querySelectorAll('#fileTabsContainer .file-tab').forEach(t => {
                                t.classList.toggle('active', t.dataset.filePath === currentOpenFile);
                            });
                        } else if (!lowerUserMessage.startsWith("add ") && !lowerUserMessage.startsWith("make ") && !lowerUserMessage.startsWith("style ") && !quickEditMatch && !deleteFileMatch) {
                            // Clear tabs if it's not a file modification/addition command for an existing project context
                            // and if no new project files were generated by other means (like create file/component).
                            updateFileTabs([]);
                        }
                    } else {
                        updateFileTabs([]);
                    }

                    renderPagePreview();
                }, 500 + Math.random() * 500);
            }

            // --- Event Listeners ---
            sendButton.addEventListener('click', handleUserInput);
            userInputEl.addEventListener('keypress', (event) => {
                if (event.key === 'Enter') {
                    handleUserInput();
                }
            });
        });
    </script>
</body>
</html>
