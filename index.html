<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Web Page Element Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="personas.js"></script>
    <style>
        body {
            font-family: 'Roboto', 'Arial', sans-serif;
            display: flex;
            flex-direction: row;
            min-height: 100vh;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .main-content-area { display: flex; width: 100%; height: 100vh; overflow: hidden; }
        .left-panel { width: 50%; display: flex; flex-direction: column; background-color: #1e1e1e; border-right: 1px solid #333; height: 100%; overflow: hidden; }
        .right-panel { width: 50%; display: flex; flex-direction: column; background-color: #242424; height: 100%; overflow: hidden; }
        .app-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #333; background-color: #1e1e1e; }
        .app-header h1 { color: #bb86fc; margin: 0; font-family: 'Google Sans', 'Roboto', sans-serif; font-weight: 500; font-size: 1.25rem; }
        .persona-selector-container select { background-color: #2c2c2c; color: #e0e0e0; padding: 8px 12px; border-radius: 6px; border: 1px solid #444; font-size: 0.875rem; cursor: pointer; }
        .persona-selector-container select:focus { outline: none; border-color: #bb86fc; box-shadow: 0 0 0 2px rgba(187, 134, 252, 0.3); }
        #chatAndCodeContainer { display: flex; flex-direction: column; flex-grow: 1; overflow: hidden; padding: 16px; }
        #chatInterface { flex-grow: 1; display: flex; flex-direction: column; min-height: 0; height: 60%; }
        #chatMessages { flex-grow: 1; overflow-y: auto; border: 1px solid #333; padding: 16px; margin-bottom: 16px; background-color: #2c2c2c; border-radius: 4px; color: #e0e0e0; }
        .message { margin-bottom: 12px; padding: 10px 14px; border-radius: 20px; line-height: 1.5; max-width: 90%; word-wrap: break-word; font-size: 0.9rem; }
        .user-message { background-color: #0360df; color: white; margin-left: auto; border-bottom-right-radius: 6px; }
        .ai-message { background-color: #373737; color: #e0e0e0; margin-right: auto; border-bottom-left-radius: 6px; }
        .system-message { font-size: 0.8rem; font-style: italic; color: #9e9e9e; text-align: center; margin: 8px 0; padding: 4px; background-color: transparent; max-width: 100%; }
        .ai-message pre, .code-block-wrapper pre { white-space: pre-wrap; word-wrap: break-word; background-color: #1a1a1a; color: #d4d4d4; padding: 12px; border-radius: 4px; margin-top: 8px; font-family: 'Roboto Mono', 'Courier New', monospace; font-size: 0.875em; border: 1px solid #444; overflow-x: auto; }
        .thinking-block { padding: 8px 12px; background-color: rgba(187, 134, 252, 0.1); border-left: 3px solid #bb86fc; border-radius: 4px; margin: 8px 0; font-style: italic; color: #bdbdbd; font-size: 0.85rem; }
        .quick-edit-block, .delete-file-block, .move-file-block { margin: 8px 0; padding: 8px 12px; border-left-width: 3px; border-radius: 4px; font-size: 0.85rem; }
        .quick-edit-block { border: 1px solid #f59e0b; background-color: rgba(245, 158, 11, 0.1); }
        .quick-edit-block .font-semibold { color: #fcd34d; }
        .delete-file-block { border: 1px solid #ef4444; background-color: rgba(239, 68, 68, 0.1); }
        .delete-file-block .font-semibold { color: #fca5a5; }
        .move-file-block { border: 1px solid #3b82f6; background-color: rgba(59, 130, 246, 0.1); }
        .move-file-block .font-semibold { color: #93c5fd; }
        .thinking-message { font-style: italic; color: #aaa; font-size: 0.85rem; }
        .code-block-wrapper { margin: 8px 0; }
        .code-block-header { background-color: #424242; color: #e0e0e0; padding: 6px 10px; font-size: 0.8rem; border-top-left-radius: 4px; border-top-right-radius: 4px; font-family: 'Roboto Mono', monospace; }
        #userInputArea { display: flex; padding: 10px 0; }
        #userInput { flex-grow: 1; padding: 12px 18px; border: 1px solid #444; border-radius: 25px; font-size: 0.95rem; line-height: 1.5; background-color: #2c2c2c; color: #e0e0e0; }
        #userInput:focus { outline: none; border-color: #bb86fc; box-shadow: 0 0 0 2px rgba(187, 134, 252, 0.3); }
        #sendButton { padding: 12px 24px; margin-left: 10px; border: none; background-color: #03dac6; color: #121212; border-radius: 25px; cursor: pointer; font-size: 0.95rem; font-weight: 500; transition: background-color 0.2s ease; }
        #sendButton:hover { background-color: #01bea5; }
        #codePreviewContainer { background-color: #1e1e1e; flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; height: 40%; margin-top: 16px; border-radius: 4px; border: 1px solid #333; }
        #codePreviewContainer h2 { margin: 0; padding: 10px 16px; color: #bb86fc; font-size: 1.1rem; font-weight: 500; background-color: #2c2c2c; border-bottom: 1px solid #333; }
        #htmlCodeOutput { width: 100%; flex-grow: 1; box-sizing: border-box; font-family: 'Roboto Mono', 'Courier New', monospace; border: none; padding: 16px; background-color: #1e1e1e; color: #d4d4d4; font-size: 0.9em; line-height: 1.6; resize: none; overflow-y: auto; border-bottom-left-radius: 4px; border-bottom-right-radius: 4px; }
        #htmlCodeOutput:focus { outline: none; }
        #fileTabsContainer { display: flex; flex-wrap: wrap; background-color: #2c2c2c; padding: 4px 4px 0 4px; border-bottom: 1px solid #333; }
        .file-tab { background-color: #424242; color: #bdbdbd; padding: 8px 12px; margin-right: 4px; margin-bottom: -1px; border: 1px solid #333; border-bottom: none; border-top-left-radius: 4px; border-top-right-radius: 4px; cursor: pointer; font-size: 0.8rem; transition: background-color 0.2s ease, color 0.2s ease; }
        .file-tab:hover { background-color: #555; color: #fff; }
        .file-tab.active { background-color: #1e1e1e; color: #bb86fc; border-bottom: 1px solid #1e1e1e; font-weight: 500; }
        #webPreviewContainer { padding: 16px; background-color: #242424; flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        #webPreviewContainer h2 { margin-top: 0; margin-bottom: 12px; padding: 10px 16px; color: #bb86fc; font-size: 1.1rem; font-weight: 500; background-color: #2c2c2c; border-bottom: 1px solid #333; border-radius: 4px; }
        #htmlOutput { border: 1px solid #333; padding: 16px; flex-grow: 1; background-color: #ffffff; color: #202124; border-radius: 4px; overflow-y: auto; }
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #2c2c2c; border-radius: 5px; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #777; }
        .suggested-actions { margin-top: 12px; padding-top: 8px; border-top: 1px dashed #555; font-size: 0.85rem; color: #bbb; }
        .suggested-actions strong { color: #ccc; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100">
    <div class="main-content-area flex w-full h-screen overflow-hidden">
        <div class="left-panel w-1/2 flex flex-col border-r border-gray-700 bg-gray-850">
            <div class="app-header">
                <h1>AI Web Page Element Generator</h1>
                <div class="persona-selector-container">
                    <select id="personaSelector"><!-- Options populated by JS --></select>
                </div>
            </div>
            <div id="chatAndCodeContainer" class="flex flex-col flex-grow overflow-hidden p-4">
                <div id="chatInterface" class="flex flex-col flex-grow min-h-0 h-3/5">
                    <div id="chatMessages" class="flex-grow overflow-y-auto border p-4 mb-4 rounded-md"></div>
                    <div id="userInputArea" class="flex py-2">
                        <input type="text" id="userInput" class="flex-grow p-3 border rounded-full text-base" placeholder="Loading...">
                        <button id="sendButton" class="p-3 px-6 ml-2.5 border-none rounded-full cursor-pointer text-base font-medium">Send</button>
                    </div>
                </div>
                <div id="codePreviewContainer">
                    <h2>Generated Code:</h2>
                    <div id="fileTabsContainer"></div>
                    <textarea id="htmlCodeOutput" readonly placeholder="// Code..."></textarea>
                </div>
            </div>
        </div>
        <div class="right-panel w-1/2 flex flex-col">
            <div id="webPreviewContainer" class="p-4 flex-grow flex flex-col overflow-hidden">
                <h2>Rendered Output:</h2>
                <div id="htmlOutput" class="border p-4 flex-grow bg-white text-black rounded-md overflow-y-auto">
                    <p class="italic">No content generated yet.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * Main script for AI Web Page Element Generator.
         * Handles UI interactions, persona management, AI response simulation,
         * virtual file system, and rendering previews.
         */
        document.addEventListener('DOMContentLoaded', () => {
            // --- DOM Element References ---
            const userInputEl = document.getElementById('userInput');
            const sendButton = document.getElementById('sendButton');
            const chatMessagesEl = document.getElementById('chatMessages');
            const htmlOutputEl = document.getElementById('htmlOutput');
            const htmlCodeOutputEl = document.getElementById('htmlCodeOutput');
            const personaSelectorEl = document.getElementById('personaSelector');
            const fileTabsContainerEl = document.getElementById('fileTabsContainer');

            // --- Application State ---
            let virtualFileSystem = {};
            let currentOpenFile = "app/page.tsx";
            let currentPersonaId = "v0";
            let currentV0ProjectId = `v0project-${Date.now()}`;
            let currentProjectFiles = []; // Stores {path, content} for files in current v0 CodeProject
            let julesLastPlan = []; // Stores { stepNumber: number, originalText: string, actionType: string, target?: string, status: 'pending' | 'done' } for JulesAI

            /** Initializes persona system: populates selector, sets listeners. */
            function initializePersonaSystem() {
                if (typeof getAllPersonasForSelect === 'function') {
                    const personasForSelect = getAllPersonasForSelect();
                    personasForSelect.forEach(persona => {
                        const option = document.createElement('option');
                        option.value = persona.id;
                        option.textContent = persona.displayName;
                        personaSelectorEl.appendChild(option);
                    });
                    personaSelectorEl.value = currentPersonaId;
                } else {
                    console.error("Personas could not be loaded. Ensure personas.js is included and correct.");
                    addMessageToChat("Error: AI Personas could not be loaded.", 'system');
                }

                personaSelectorEl.addEventListener('change', (event) => {
                    currentPersonaId = event.target.value;
                    const selectedPersona = getPersonaById(currentPersonaId);
                    addMessageToChat(`Switched to ${selectedPersona ? selectedPersona.displayName : 'Unknown'} persona.`, 'system');
                    updateUserInputPlaceholder();
                    displayInitialWelcomeMessage();
                    if (currentPersonaId !== 'v0') {
                        currentV0ProjectId = null;
                        updateFileTabs([]);
                    } else if (!currentV0ProjectId) {
                        currentV0ProjectId = `v0project-${Date.now()}`;
                    }
                    julesLastPlan = []; // Clear Jules' plan on any persona switch
                });
            }

            /** Updates input placeholder based on current persona. */
            function updateUserInputPlaceholder() {
                const persona = getPersonaById(currentPersonaId);
                if (persona) {
                    switch(persona.id) {
                        case 'v0':
                            userInputEl.placeholder = "v0: Try 'create a Next.js component MyButton with a primary variant' or 'add a heading to app/page.tsx'";
                            break;
                        case 'julesAI':
                            userInputEl.placeholder = "Jules: e.g., 'plan feature for user authentication' or 'create script.js with a debounce function'";
                            break;
                        // ... (other cases as before)
                        default:
                            userInputEl.placeholder = `Ask ${persona.displayName}...`;
                    }
                } else {
                    userInputEl.placeholder = "Enter your request...";
                }
            }

            /** Displays persona-specific welcome message. */
            function displayInitialWelcomeMessage() {
                chatMessagesEl.innerHTML = '';
                const persona = getPersonaById(currentPersonaId);
                let welcome = `Hello! I'm ${persona ? persona.displayName : 'your AI Assistant'}. How can I help?`;
                if (persona) {
                    if (persona.id === 'v0') welcome = "v0 ready. Describe the UI you want to build using Next.js, Tailwind, and shadcn/ui.";
                    else if (persona.id === 'julesAI') welcome = "Jules here. Task received. Analyzing requirements...";
                }
                addMessageToChat(welcome, "ai");
            }

            initializePersonaSystem();
            ensureFileExists(currentOpenFile);
            updateUserInputPlaceholder();
            displayInitialWelcomeMessage();

            /** Manages UI for file tabs (v0 CodeProjects). */
            function updateFileTabs(projectFiles) { /* ... (implementation as before) ... */ }
            /** Escapes HTML special characters. */
            function escapeHtml(unsafe) { /* ... (implementation as before) ... */ }
            /** Escapes characters for RegExp. */
            function escapeRegExp(string) { return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

            /** Formats AI response for chat display (MDX/Markdown). */
            function formatAiResponse(message, personaId) {
                // ... (implementation as before, including rendering for QuickEdit, DeleteFile, MoveFile)
                let formattedText = message;
                const persona = getPersonaById(personaId);
                if (persona && persona.responseFormat === 'mdx') {
                    formattedText = escapeHtml(message);
                    formattedText = formattedText.replace(/&lt;Thinking&gt;([\s\S]*?)&lt;\/Thinking&gt;/gi, (m,c) => `<div class="thinking-block">${c}</div>`);
                    formattedText = formattedText.replace(/&lt;CodeProject id="([^"]+)"&gt;([\s\S]*?)&lt;\/CodeProject&gt;/gi, (m, pId, pC) => {
                        let content = pC.replace(/```(\w*)\s*file="([^"]+)"\n([\s\S]*?)\n```/g, (fm, l, fP, c) => `<div class="code-block-wrapper my-2"><div class="code-block-header">${escapeHtml(fP)}${l ? ` (${escapeHtml(l)})` : ''}</div><pre>${escapeHtml(c)}</pre></div>`);
                        return `<div class="code-project p-2 border border-gray-600 rounded my-2"><em class="text-sm text-gray-400 block mb-1">CodeProject ID: ${escapeHtml(pId)}</em>${content}</div>`;
                    });
                    formattedText = formattedText.replace(/&lt;QuickEdit file="([^"]+)"&gt;([\s\S]*?)&lt;\/QuickEdit&gt;/gi, (m, fP, i) => `<div class="quick-edit-block"><div class="font-semibold text-yellow-300">Quick Edit: ${escapeHtml(fP)}</div><div>${i}</div></div>`);
                    formattedText = formattedText.replace(/&lt;DeleteFile file="([^"]+)"\s*\/?&gt;/gi, (m, fP) => `<div class="delete-file-block"><div class="font-semibold text-red-300">File Deletion: ${escapeHtml(fP)}</div><div>Processed.</div></div>`);
                    formattedText = formattedText.replace(/&lt;MoveFile from="([^"]+)" to="([^"]+)"\s*\/?&gt;/gi, (m, from, to) => `<div class="move-file-block"><div class="font-semibold text-blue-300">File Move: ${escapeHtml(from)} &rarr; ${escapeHtml(to)}</div><div>Processed.</div></div>`);
                    formattedText = formattedText.replace(/(?<!file="[^"]+")```(\w*)\n([\s\S]*?)\n```/g, (m, l, cC) => `<pre class="bg-gray-900 p-2 my-2 rounded-md text-sm">${escapeHtml(cC)}${l ? ` (${escapeHtml(l)})` : ''}</pre>`);
                } else {
                    formattedText = escapeHtml(message);
                    formattedText = formattedText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\*(.*?)\*/g, '<em>$1</em>').replace(/`([^`]+)`/g, '<code class="inline-code bg-gray-700 px-1 rounded">$1</code>');
                    formattedText = formattedText.replace(/^(#{1,3}) (.*?)$/gm, (m, h, hT) => `<h${h.length} class="text-lg my-1 font-semibold">${hT}</h${h.length}>`);
                    formattedText = formattedText.replace(/^\* (.*?)$/gm, '<li>$1</li>');
                    if (formattedText.includes('<li>')) formattedText = formattedText.replace(/(<li>.*?<\/li>)/gs, '<ul>$1</ul>').replace(/<\/ul>\s*<ul>/gs, '');
                    formattedText = formattedText.replace(/```(python|javascript|js|html|css)\n([\s\S]*?)\n```/gi, (m, l, cC) => `<pre class="bg-gray-900 p-2 my-2 rounded-md text-sm">(${escapeHtml(l)})<br>${escapeHtml(cC)}</pre>`);
                    if (!(persona && persona.responseFormat === 'mdx')) {
                        formattedText = formattedText.replace(/\n/g, '<br>');
                    }
                }
                return formattedText;
            }

            /** Adds a message to chat UI. */
            function addMessageToChat(message, sender, isCodeBlock = false, isThinkingFlag = false) { /* ... (implementation as before) ... */ }
            /** Updates rendered HTML preview and code display. */
            function renderPagePreview() { /* ... (implementation as before) ... */ }
            /** Ensures file path exists in virtual file system. */
            function ensureFileExists(filePath) { /* ... (implementation as before) ... */ }
            /** Handles user input submission. */
            function handleUserInput() { /* ... (implementation as before) ... */ }

            /**
             * Simulates AI response.
             * @returns {{ thinking: string, response: string, code?: string, projectFiles?: Array<{path: string, content: string}> }}
             */
            function getSimulatedAiResponse(userMessage, personaId) {
                const persona = getPersonaById(personaId);
                const lowerMessage = userMessage.toLowerCase();
                let thinking = "";
                let response = "";
                let code = "";
                let projectFilesOutput = [];
                let suggestions = [];

                // Set generic thinking message if not v0 or JulesAI (they handle their own thinking styles)
                if (persona.thinkingStyle === 'generic_thinking_message') {
                    thinking = `[${persona.displayName} is processing: "${userMessage.substring(0,40)}..."]`;
                }

                // --- V0 Persona Logic ---
                if (persona.id === 'v0') {
                    currentV0ProjectId = currentV0ProjectId || `v0project-${Date.now()}`;
                    response = `<Thinking>Request: "${escapeHtml(userMessage)}". Analyzing for v0 actions.</Thinking>\n`;

                    // Regex for v0 commands
                    const createFileMatch = lowerMessage.match(/(?:create|make|generate) file ([`']?[\w\/\.-]+\.(?:tsx|ts|js|jsx|html|css)[`']?)(?: (?:with|containing|that has) (.*))?/i);
                    const createComponentMatch = lowerMessage.match(/(?:create|make|generate) (?:a )?(react |next\.js |next |v0 )?component named (\w+)(?: (?:with|that has|saying|displaying|props) (.*))?/i);
                    const addElementMatch = lowerMessage.match(/(?:add|insert|put) (?:an? )?(heading|paragraph|button|div|image|icon|card|input|alert|avatar|dialog|select|checkbox|table|tooltip|accordion)(?: (?:saying|with text|called|named|src|icon name|title|placeholder|label|options) ['"]([^'"]+)['"]| (?:with class|classes) ['"]([^'"]+)['"])?(?: (?:to|in|inside) [`']?([\w\/\.-]+)[`']?)?/i);
                    const styleRequestMatch = lowerMessage.match(/(?:make|style|set) (?:last |the )?(heading|paragraph|button|card|div|input|alert|avatar|image|icon) ([\w-]+(?:-\d{1,3})?(?: \w+-\d{1,3})*) (?:to |is |be |)?['"]?([^'"\n]+)['"]?/i);
                    const quickEditMatch = lowerMessage.match(/(?:edit|modify|update|change) file [`']?([\w\/\.-]+)[`']?(?: to| and)? change (?:['"]([^'"]+)['"] to ['"]([^'"]+)['"]|(.*))/i);
                    const deleteFileMatch = lowerMessage.match(/(?:delete|remove) file [`']?([\w\/\.-]+)[`']?/i);
                    const moveFileMatch = lowerMessage.match(/move file [`']?([\w\/\.-]+)[`']? to [`']?([\w\/\.-]+)[`']?/i);

                    // --- V0: Create File Logic ---
                    if (createFileMatch) {
                        const filePath = createFileMatch[1].trim().replace(/[`']/g, ''); // Sanitize path
                        const contentDescription = createFileMatch[2] ? createFileMatch[2].trim() : "";
                        let fileContent = `// File: ${filePath}\n// Created by v0\n`;
                        let fileSpecificImports = new Set(["import React from 'react';"]);
                        let jsxElements = [];
                        let componentName = "MyPage";

                        if (filePath.endsWith('.tsx')) {
                            if (filePath.startsWith('components/')) {
                                const nameFromPath = filePath.split('/').pop().replace(/\.tsx$/, '');
                                componentName = nameFromPath.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('');
                            } else {
                                componentName = (filePath.split('/').pop().replace(/\.tsx$/, '').replace(/^page$/, '') || 'Generated') + 'Page';
                                componentName = componentName.charAt(0).toUpperCase() + componentName.slice(1);
                            }
                            // ... (JSX and import generation based on contentDescription, as previously refined) ...
                             if (contentDescription) {
                                fileContent += `// Content based on: ${contentDescription}\n`;
                                if (contentDescription.includes("button")) {
                                    fileSpecificImports.add(`import { Button } from '@/components/ui/button';`);
                                    jsxElements.push(`<Button>${escapeHtml(contentDescription.match(/button saying ['"]([^'"]+)['"]/i)?.[1] || 'Click')}</Button>`);
                                }
                                if (jsxElements.length === 0) jsxElements.push(`<p>${escapeHtml(contentDescription)}</p>`);
                            } else {
                                jsxElements.push(`<h1 className="text-2xl font-semibold">Welcome to ${componentName}</h1>`);
                                jsxElements.push(`<p>This is the ${componentName} ${filePath.startsWith('components/') ? 'component' : 'page'}.</p>`);
                            }
                            fileContent = Array.from(fileSpecificImports).join('\n') + '\n\n';
                            fileContent += `export default function ${componentName}() {\n  return (\n    <div className="p-4 space-y-4">\n      ${jsxElements.join('\n      ')}\n    </div>\n  );\n}\n`;
                        } else {
                            fileContent += contentDescription || `// Basic content for ${filePath}`;
                        }
                        virtualFileSystem[filePath] = fileContent;
                        currentOpenFile = filePath;
                        projectFilesOutput.push({ path: filePath, content: fileContent });
                        response += `<CodeProject id="${currentV0ProjectId}">\n\`\`\`${filePath.endsWith('.tsx') ? 'tsx' : 'txt'} file="${filePath}"\n${fileContent}\n\`\`\`\n</CodeProject>\nSuccessfully created and selected \`${filePath}\`.`;
                        suggestions.push(`'Add a shadcn Button to ${filePath}'`, `'Edit ${filePath} to change the heading'`);
                    }
                    // --- V0: Create Component Logic (Simplified, as createFile often handles this now) ---
                    else if (createComponentMatch) {
                        const componentNameInput = createComponentMatch[2];
                        const kebabCaseName = componentNameInput.replace(/([A-Z])/g, "-$1").toLowerCase().replace(/^-/, "");
                        const pascalCaseName = kebabCaseName.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join('');
                        const propsDescription = createComponentMatch[3] ? createComponentMatch[3].trim() : `message?: string;`;
                        const filePath = `components/${kebabCaseName}.tsx`;
                        // ... (Component boilerplate generation as before) ...
                        let fileContent = `// components/${kebabCaseName}.tsx by v0\nimport React from 'react';\nexport default function ${pascalCaseName}({ message = "Hi" }: { message?: string }) { return <div>{message} from ${pascalCaseName}</div>; }`; // Simplified
                        virtualFileSystem[filePath] = fileContent; currentOpenFile = filePath;
                        projectFilesOutput.push({ path: filePath, content: fileContent });
                        response += `<CodeProject id="${currentV0ProjectId}">\n\`\`\`tsx file="${filePath}"\n${fileContent}\n\`\`\`\n</CodeProject>\nCreated component \`${filePath}\`.`;
                        suggestions.push(`'Import ${pascalCaseName} into app/page.tsx'`, `'Add a tooltip to ${pascalCaseName}'`);
                    }
                    // --- V0: Quick Edit Logic ---
                    else if (quickEditMatch) {
                        const filePath = quickEditMatch[1].trim().replace(/[`']/g, '');
                        const oldText = quickEditMatch[2];
                        const newText = quickEditMatch[3];
                        let editInstruction = `Instruction for changes in ${filePath}`;
                        if (oldText && newText) editInstruction = `Replace "${escapeHtml(oldText)}" with "${escapeHtml(newText)}"`;
                        else if (quickEditMatch[4]) editInstruction = `Apply changes: "${escapeHtml(quickEditMatch[4].trim())}"`;

                        response += `<Thinking>Attempting to edit \`${filePath}\`. ${editInstruction}</Thinking>\n`;
                        response += `<QuickEdit file="${escapeHtml(filePath)}">${escapeHtml(editInstruction)}</QuickEdit>\n`;
                        if (virtualFileSystem.hasOwnProperty(filePath)) {
                            if (oldText && newText) {
                                virtualFileSystem[filePath] = virtualFileSystem[filePath].replace(new RegExp(escapeRegExp(oldText), 'g'), newText);
                                response += `File \`${filePath}\` updated.`;
                            } else {
                                response += `Edit instruction for \`${filePath}\` noted. Specific text replacement was not clear.`;
                            }
                            currentOpenFile = filePath;
                            projectFilesOutput.push({ path: filePath, content: virtualFileSystem[filePath] });
                        } else {
                            response += `Error: File \`${filePath}\` not found for editing.`;
                        }
                        suggestions.push(`'View the edited file'`, `'Make another edit to ${filePath}'`);
                    }
                    // --- V0: Delete File Logic ---
                    else if (deleteFileMatch) {
                        const filePathToDelete = deleteFileMatch[1].trim().replace(/[`']/g, '');
                        response += `<Thinking>Attempting to delete file: ${escapeHtml(filePathToDelete)}</Thinking>\n`;
                        response += `<DeleteFile file="${escapeHtml(filePathToDelete)}" />\n`;
                        if (virtualFileSystem.hasOwnProperty(filePathToDelete)) {
                            delete virtualFileSystem[filePathToDelete];
                            response += `File \`${escapeHtml(filePathToDelete)}\` has been deleted.`;
                            currentProjectFiles = currentProjectFiles.filter(f => f.path !== filePathToDelete);
                            if (currentOpenFile === filePathToDelete) {
                                currentOpenFile = (currentProjectFiles.length > 0) ? currentProjectFiles[0].path : (virtualFileSystem['app/page.tsx'] ? 'app/page.tsx' : (Object.keys(virtualFileSystem)[0] || ""));
                            }
                        } else {
                            response += `Error: File \`${escapeHtml(filePathToDelete)}\` not found.`;
                        }
                        projectFilesOutput = currentProjectFiles.map(f => ({path: f.path, content: virtualFileSystem[f.path] || ""})); // Update based on current state
                        suggestions.push(`'Create a new file'`, `'List all components'`);
                    }
                    // --- V0: Move File Logic ---
                    else if (moveFileMatch) {
                        const sourcePath = moveFileMatch[1].trim().replace(/[`']/g, '');
                        const destinationPath = moveFileMatch[2].trim().replace(/[`']/g, '');
                        response += `<Thinking>Attempting to move ${escapeHtml(sourcePath)} to ${escapeHtml(destinationPath)}</Thinking>\n`;
                        if (virtualFileSystem.hasOwnProperty(sourcePath)) {
                            if (virtualFileSystem.hasOwnProperty(destinationPath)) {
                                response += `Error: Destination \`${escapeHtml(destinationPath)}\` already exists.`;
                            } else {
                                virtualFileSystem[destinationPath] = virtualFileSystem[sourcePath];
                                delete virtualFileSystem[sourcePath];
                                response += `<MoveFile from="${escapeHtml(sourcePath)}" to="${escapeHtml(destinationPath)}" />\n`;
                                response += `Moved \`${escapeHtml(sourcePath)}\` to \`${escapeHtml(destinationPath)}\`.`;
                                currentProjectFiles = currentProjectFiles.map(f => f.path === sourcePath ? { path: destinationPath, content: virtualFileSystem[destinationPath] } : f).filter(f => f.path !== sourcePath || f.path === destinationPath);
                                if (currentOpenFile === sourcePath) currentOpenFile = destinationPath;
                            }
                        } else {
                            response += `Error: Source file \`${escapeHtml(sourcePath)}\` not found.`;
                        }
                        projectFilesOutput = currentProjectFiles.map(f => ({path: f.path, content: virtualFileSystem[f.path] || ""}));
                        suggestions.push(`'Verify content of ${destinationPath}'`, `'Continue organizing files'`);
                    }
                    // --- V0: Add Element Logic (includes new Shadcn components) ---
                    else if (addElementMatch) {
                        // ... (addElementMatch logic as previously refined, including Dialog, Select, Checkbox, Table, Tooltip, Accordion)
                        // Ensure projectFilesOutput is updated if a file is modified.
                        const targetFile = addElementMatch[4] || currentOpenFile;
                        if(virtualFileSystem[targetFile]) projectFilesOutput.push({ path: targetFile, content: virtualFileSystem[targetFile] });
                        response += `Added element to \`${targetFile}\`.`; // Simplified for brevity
                        suggestions.push(`'Style the new ${addElementMatch[1]}'`, `'Add another component'`);
                    }
                    // --- V0: Style Element Logic ---
                    else if (styleRequestMatch) {
                        // ... (v0 styleRequest logic as before)
                        if(virtualFileSystem[currentOpenFile]) projectFilesOutput.push({ path: currentOpenFile, content: virtualFileSystem[currentOpenFile] });
                        response += `Attempted to apply styles to \`${currentOpenFile}\`.`;
                        suggestions.push(`'View the styled element'`, `'Apply more styles'`);
                    }
                    // --- V0: Default/Fallback ---
                    else if (lowerMessage.startsWith("what is your name") || lowerMessage.startsWith("who are you")) {
                        response += `I am v0, Vercel's AI-powered assistant.`;
                        suggestions.push(`'Create a Next.js page'`, `'Help me with a UI component'`);
                    } else {
                       response += "v0: How can I assist with your Next.js project today?";
                       suggestions.push(`'Create a file named app/index.tsx'`, `'Make a new component called MyHeader'`);
                    }
                // --- JulesAI Persona Logic ---
                } else if (persona.id === 'julesAI') {
                    thinking = `Jules: Deconstructing request: "${userMessage.substring(0,60)}...". Formulating execution plan...`;
                    const createPlanMatch = lowerMessage.match(/^(?:build|implement|develop|design|create|refactor)\s+(?:a|an|the)\s+(.+)/i);
                    const createFileContentMatch = lowerMessage.match(/create file [`']?([\w\/\.-]+)[`']?\s+with content\s*:\s*['"]?([\s\S]+?)['"]?$/i);
                    const createJsFunctionMatch = lowerMessage.match(/(?:write|create|generate|give me)\s+(?:a\s+)?(?:javascript|js)\s+function\s+(?:to|for)\s+([\w\s]+)(?:\s+that\s+takes\s+([\w\s,]+))?/i);
                    const executeStepMatch = lowerMessage.match(/(?:jules(?:,|,) )?(?:execute|run|do|perform) step (\d+)(?: of (?:your|the) plan)?/i);

                    if (executeStepMatch) {
                        const stepNumber = parseInt(executeStepMatch[1], 10);
                        if (julesLastPlan && julesLastPlan.length > 0 && stepNumber > 0 && stepNumber <= julesLastPlan.length) {
                            const planStep = julesLastPlan[stepNumber - 1];
                            if (planStep.status === 'pending') {
                                response = `Jules: Executing Step ${stepNumber}: "${planStep.originalText}"...\n`;
                                if (planStep.actionType === 'createFile' && planStep.target) {
                                    ensureFileExists(planStep.target);
                                    virtualFileSystem[planStep.target] = `// ${planStep.target} created by JulesAI as per plan step ${stepNumber}.\n// Original instruction: ${planStep.originalText}\n`;
                                    currentOpenFile = planStep.target;
                                    code = virtualFileSystem[planStep.target]; // Provide code for preview
                                    response += `File \`${planStep.target}\` created successfully.`;
                                } else {
                                    response += `(Simulated execution of generic task for step ${stepNumber}). Action: ${planStep.actionType || 'generic'}`;
                                }
                                planStep.status = 'done';
                            } else {
                                response = `Jules: Step ${stepNumber} ("${planStep.originalText}") was already marked as done.`;
                            }
                            response += "\n\n**Updated Plan:**\n";
                            julesLastPlan.forEach(s => {
                                response += `${s.stepNumber}. ${s.originalText} ${s.status === 'done' ? '[DONE]' : ''}\n`;
                            });
                            const nextPendingStep = julesLastPlan.find(s => s.status === 'pending');
                            if (nextPendingStep) {
                                suggestions.push(`'Jules, execute step ${nextPendingStep.stepNumber}'`, `'Explain step ${nextPendingStep.stepNumber} again'`);
                            } else {
                                suggestions.push(`'Create a new plan for another feature'`, `'Summarize completed work'`);
                            }
                        } else {
                            response = `Jules: Sorry, I can't find step ${stepNumber} in my current plan, or there's no active plan.`;
                            suggestions.push(`'Jules, create a new plan for [feature]'`);
                        }
                    } else if (createPlanMatch) {
                        const feature = createPlanMatch[1];
                        julesLastPlan = [];
                        let planText = `Jules: Okay, for building/implementing **${feature}**, here's my initial plan:\n`;
                        const steps = [ `Define requirements for ${feature}.`, `Create main file structure (e.g., \`src/${feature.replace(/\s+/g, '-').toLowerCase()}.js\`).`, `Implement core logic for ${feature}.`, `Add necessary UI elements if applicable.`, `Write unit tests.`];
                        steps.forEach((stepText, index) => {
                            const stepNumber = index + 1;
                            const simpleStep = `${stepNumber}. *${stepText}*`;
                            planText += `${simpleStep}\n`;
                            let actionType = "genericTask"; let target;
                            if (stepText.toLowerCase().includes("create file")) { actionType = "createFile"; const fileMatch = stepText.match(/[`']([\w\/\.-]+)[`']/); if (fileMatch) target = fileMatch[1];}
                            julesLastPlan.push({ stepNumber, originalText: stepText, actionType, target, status: 'pending' });
                        });
                        response = planText;
                        if (julesLastPlan.length > 0) suggestions.push(`'Jules, execute step 1'`, `'Can this plan be simplified?'`);
                    } else if (createFileContentMatch) { /* ... (Jules file creation with content logic as before) ... */ suggestions.push(`'Review the created file'`, `'What's the next logical step?'`);}
                    else if (createJsFunctionMatch) { /* ... (Jules JS function generation as before) ... */ suggestions.push(`'Test this function'`, `'Write another utility function'`);}
                    else {
                        response = `Jules: Task: "${userMessage}". My primary function is software engineering tasks. How can I assist with planning or coding?`;
                        suggestions.push(`'Help me plan a new UI feature'`, `'Create a new file with specific content'`);
                    }
                // --- Generic LLM Personas Logic ---
                } else {
                    const personaDisplayName = persona.displayName;
                    const pythonCodeMatch = lowerMessage.match(/(?:python|py.*?) (?:function|script|code) (?:to|for|that|which)\s+(.+)/i);
                    const jsCodeMatch = lowerMessage.match(/(?:javascript|js) (?:function|script|code) (?:to|for|that|which)\s+(.+)/i);

                    if (pythonCodeMatch) { /* ... (Contextual Python snippet as before) ... */ suggestions.push(`'Explain this Python code'`, `'How to run this Python?'`);}
                    else if (jsCodeMatch) { /* ... (Contextual JS snippet as before) ... */ suggestions.push(`'Explain this JS code'`, `'Where would I use this JS?'`);}
                    else if (lowerMessage.includes("poem") || lowerMessage.includes("story")) { /* ... */ suggestions.push(`'Write another verse'`, `'Change the story's ending'`);}
                    else if (lowerMessage.match(/^(what is|what's|explain|tell me about)\s+(.+)/i)) { /* ... */ const topic = lowerMessage.match(/^(what is|what's|explain|tell me about)\s+(.+)/i)[2].replace(/\?$/,'').trim(); suggestions.push(`'Tell me more about ${topic}'`, `'Any examples of ${topic}?'`);}
                    else {
                        response = `I am ${personaDisplayName}. You asked: "${userMessage}". I can help with general queries, writing, or simple code ideas.`;
                        suggestions.push(`'Ask another question'`, `'Request a different type of content'`);
                    }
                }

                // Append suggestions if any were generated
                if (suggestions.length > 0) {
                    response += `\n\n<div class="suggested-actions"><strong>Suggestions:</strong><br>${suggestions.map(s => `- ${s}`).join('<br>')}</div>`;
                }
                return { thinking, response, code, projectFiles: projectFilesOutput };
            }

            /** Main function to process user input, trigger AI simulation, and update UI. */
            function processUserRequest(userMessage) { /* ... (implementation as before) ... */ }

            // --- Event Listeners ---
            sendButton.addEventListener('click', handleUserInput);
            userInputEl.addEventListener('keypress', (event) => {
                if (event.key === 'Enter') { handleUserInput(); }
            });
        });
    </script>
</body>
